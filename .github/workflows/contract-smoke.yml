# 契约冒烟（与完整 build 矩阵分离，PR 上快速反馈）
name: Contract smoke

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  perf-testing:
    name: perf_testing (pytest + static CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - uses: astral-sh/setup-uv@v5

      - name: Schema + CLI smoke tests
        working-directory: perf_testing
        run: |
          set -euo pipefail
          uv sync
          uv run pytest tests/test_hapray_tool_result_contract.py tests/test_contract_cli_smoke.py -v

  optimization-detector:
    name: optimization_detector (empty input → tool-result)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - uses: astral-sh/setup-uv@v5

      - name: Empty input dir writes hapray-tool-result.json beside -o
        working-directory: tools/optimization_detector
        run: |
          set -euo pipefail
          uv sync
          mkdir -p /tmp/empty_od
          set +e
          uv run python cli.py -i /tmp/empty_od -o /tmp/opt_contract_smoke.xlsx
          code=$?
          set -e
          test "$code" -eq 1
          test -f /tmp/hapray-tool-result.json
          python3 -c "import json; json.load(open('/tmp/hapray-tool-result.json'))"

  symbol-recovery:
    name: symbol_recovery (missing perf.data → tool-result)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - uses: astral-sh/setup-uv@v5

      - name: Missing perf.data writes hapray-tool-result.json under output-dir
        working-directory: tools/symbol_recovery
        run: |
          set -euo pipefail
          uv sync
          TMP=$(mktemp -d)
          set +e
          uv run python main.py --perf-data "$TMP/missing.perf.data" --output-dir "$TMP/out"
          code=$?
          set -e
          test "$code" -eq 1
          test -f "$TMP/out/hapray-tool-result.json"
          python3 -c "import json; json.load(open('$TMP/out/hapray-tool-result.json'))"
