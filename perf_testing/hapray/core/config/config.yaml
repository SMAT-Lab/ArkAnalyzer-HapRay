hiperf: # 性能采样相关
  duration: 30  # 默认采样时长（秒）
  output_path: "/data/local/tmp/perf.data"  # 性能数据在手机中的输出路径
  data_filename: "perf.data"  # 性能数据文件名
  db_filename: "perf.db"  # 数据库文件名
  event: raw-instruction-retired # 默认采集指令数，可配置为raw-cpu-cycles采集cycles
trace:
  enable: True
memory:
  enable: False  # Memory采集开关（通过命令行参数控制）
  max_stack_depth: 100  # Native Memory采集的最大调用栈深度

# 帧分析配置
frame_analysis:
  # 进行深度分析的TOP N卡顿帧数量
  # 建议值: 5-20，根据性能需求调整
  top_n_analysis: 10

# 调用链精化过滤配置
callchain_filter:
  # 系统符号排除规则（正则表达式列表）
  system_symbols:
    - '^malloc'
    - '^free'
    - '^calloc'
    - '^realloc'
    - '^__malloc'
    - '^__free'
    - '^pthread_'
    - '^__pthread_'
    - '^libc\.so'
    - '^libc\+\+\.so'

  # 系统库文件排除规则（正则表达式列表）
  system_libs:
    - 'libc\.so'
    - 'libc\+\+\.so'
    - 'libm\.so'
    - 'libdl\.so'
    - 'libpthread\.so'
    - 'libstdc\+\+\.so'
    - 'libgcc\.so'
    - 'libunwind\.so'
    - 'libcamera\.so'
    - 'libhilog\.so'
    - 'libhitracechain\.so'

  # 计算类符号排除规则（正则表达式列表）
  compute_symbols:
    - '^std::'
    - '^__gnu_cxx::'
    - '^boost::'
    - 'operator'

