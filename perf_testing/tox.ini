[tox]
envlist = ruff, py{39,310,311,312}
skipsdist = true

[testenv]
changedir = {toxinidir}
deps =
    -e .
    pytest
commands =
    pytest tests/test_performance.py::test_integration_performance_test -v -m integration
    pytest tests/test_performance.py::test_opt_test -v -m integration

[testenv:lint]
skip_install = true
deps = ruff
commands =
    ruff check .
    ruff format --check .

[testenv:lint-fix]
skip_install = true
deps = ruff
commands =
    ruff check --fix --unsafe-fixes .
    ruff format .
